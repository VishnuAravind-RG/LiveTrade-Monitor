version: '3.8'
services:
  couchdb:
    image: couchdb:3.3
    environment:
      COUCHDB_USER: admin
      COUCHDB_PASSWORD: password
    ports:
      - "5984:5984"
    volumes:
      - couchdb_data:/opt/couchdb/data

  web1:
    build: .
    ports:
      - "5001:5000"
    environment:
      - COUCHDB_URL=http://admin:password@couchdb:5984/
    depends_on:
      - couchdb

  web2:
    build: .
    ports:
      - "5002:5000"
    environment:
      - COUCHDB_URL=http://admin:password@couchdb:5984/
    depends_on:
      - couchdb

  web3:
    build: .
    ports:
      - "5003:5000"
    environment:
      - COUCHDB_URL=http://admin:password@couchdb:5984/
    depends_on:
      - couchdb

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web1
      - web2
      - web3

volumes:
  couchdb_data: