services:
  couchdb:
    image: couchdb:3.3
    environment:
      COUCHDB_USER: admin
      COUCHDB_PASSWORD: password
    ports:
      - "5984:5984"
    volumes:
      - couchdb_data:/opt/couchdb/data

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  worker:
    build: .
    command: python worker.py
    environment:
      - COUCHDB_URL=http://admin:password@couchdb:5984/
      - REDIS_URL=redis
    depends_on:
      - couchdb
      - redis

  web1:
    build: .
    command: python app.py
    ports:
      - "5001:5000"
    environment:
      - COUCHDB_URL=http://admin:password@couchdb:5984/
      - REDIS_URL=redis
    depends_on:
      - couchdb
      - redis

  web2:
    build: .
    command: python app.py
    ports:
      - "5002:5000"
    environment:
      - COUCHDB_URL=http://admin:password@couchdb:5984/
      - REDIS_URL=redis
    depends_on:
      - couchdb
      - redis

  web3:
    build: .
    command: python app.py
    ports:
      - "5003:5000"
    environment:
      - COUCHDB_URL=http://admin:password@couchdb:5984/
      - REDIS_URL=redis
    depends_on:
      - couchdb
      - redis

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web1
      - web2
      - web3

volumes:
  couchdb_data: